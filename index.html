<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LENS — 食事撮影で栄養管理</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <div class="hd-left">
      <span class="logo-lens">◉</span>
      <span class="logo-name">LENS</span>
    </div>
    <div class="hd-center" id="hd-date"></div>
    <div class="hd-right">
      <button class="hd-icon-btn" id="btn-clear-all" title="全データ削除">🗑</button>
    </div>
  </header>

  <!-- TAB NAV -->
  <nav class="tab-nav">
    <button class="tnav active" data-tab="record">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      <span>食事を記録</span>
    </button>
    <button class="tnav" data-tab="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      <span>履歴・分析</span>
      <span class="tnav-badge" id="badge-count"></span>
    </button>
  </nav>

  <!-- ========== TAB: RECORD ========== -->
  <div class="tab-panel active" id="tab-record">

    <section class="upload-section">
      <input type="file" id="file-input" accept="image/*" hidden />

      <div class="upload-zone" id="upload-zone">
        <div class="uz-rings">
          <div class="uz-ring r1"></div>
          <div class="uz-ring r2"></div>
        </div>
        <div class="uz-core">
          <svg class="uz-cam" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <p class="uz-main">写真を追加</p>
          <p class="uz-sub">タップして撮影・選択　/　ドラッグ＆ドロップ</p>
        </div>
      </div>

      <!-- Preview after image selected -->
      <div class="preview-block hidden" id="preview-block">
        <div class="pv-img-wrap">
          <img id="preview-img" src="" alt="食事写真" />
          <button class="pv-change-btn" id="preview-change">📷 写真を変更</button>
        </div>
        <div class="pv-controls">
          <p class="ctrl-label">食事の種類を選択</p>
          <div class="meal-pills" id="meal-pills">
            <button class="mpill active" data-meal="breakfast">🌅 朝食</button>
            <button class="mpill" data-meal="lunch">☀️ 昼食</button>
            <button class="mpill" data-meal="dinner">🌙 夕食</button>
            <button class="mpill" data-meal="snack">🫖 間食</button>
          </div>
          <p class="ctrl-label" style="margin-top:1.1rem">記録日</p>
          <input type="date" id="record-date" class="date-input" />
          <button class="btn-analyze" id="btn-analyze">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            AIで栄養を分析する
          </button>
        </div>
      </div>
    </section>

    <!-- Result Section -->
    <section class="result-section hidden" id="result-section">

      <!-- Loading -->
      <div class="ai-loading" id="ai-loading">
        <div class="scan-wrap">
          <img id="scan-img" src="" alt="" class="scan-photo" />
          <div class="scan-overlay">
            <div class="scan-line"></div>
            <div class="scan-corners">
              <span class="sc sc-tl"></span><span class="sc sc-tr"></span>
              <span class="sc sc-bl"></span><span class="sc sc-br"></span>
            </div>
          </div>
        </div>
        <p class="scan-label" id="scan-label">写真を解析中...</p>
        <div class="scan-dots"><span></span><span></span><span></span></div>
      </div>

      <!-- Result Content -->
      <div class="result-content hidden" id="result-content">
        <div class="rc-photo-bar">
          <img class="rc-thumb" id="rc-thumb" src="" alt="" />
          <div class="rc-top-info">
            <div class="rc-meal-tag" id="rc-meal-tag"></div>
            <div class="rc-cal"><span id="rc-cal-num">—</span><span class="rc-cal-unit">kcal</span></div>
            <div class="rc-cal-label">この食事の推定カロリー</div>
          </div>
        </div>

        <div class="ai-bubble" id="ai-bubble"></div>

        <div class="rc-block">
          <div class="rcb-title">認識した食品</div>
          <div class="foods-wrap" id="foods-wrap"></div>
        </div>

        <div class="rc-block">
          <div class="rcb-title">栄養素（推定値）</div>
          <div class="nut-list" id="nut-list"></div>
        </div>

        <button class="btn-save" id="btn-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
          この記録を保存する
        </button>
      </div>

      <!-- Error -->
      <div class="ai-error hidden" id="ai-error">
        <p class="ae-msg" id="ae-msg">分析に失敗しました</p>
        <button class="btn-retry" id="btn-retry">再試行する</button>
      </div>
    </section>

    <div class="new-entry-wrap hidden" id="new-entry-wrap">
      <button class="btn-new" id="btn-new">＋ 別の食事を記録する</button>
    </div>
  </div>

  <!-- ========== TAB: HISTORY ========== -->
  <div class="tab-panel" id="tab-history">

    <div class="history-empty hidden" id="history-empty">
      <div class="he-icon">◉</div>
      <p class="he-title">記録がまだありません</p>
      <p class="he-sub">食事を撮影すると、ここに<br>分析データが蓄積されます</p>
    </div>

    <div id="history-main" class="hidden">

      <!-- Today -->
      <section class="hs">
        <div class="hs-hd"><span class="hs-tag">TODAY</span><h2 class="hs-ttl">今日の摂取状況</h2></div>
        <div class="today-cal-card" id="today-cal-card">
          <div class="tcc-left">
            <div class="tcc-num" id="tcc-num">0</div>
            <div class="tcc-unit">kcal</div>
          </div>
          <div class="tcc-right">
            <div class="tcc-target" id="tcc-target"></div>
            <div class="tcc-meals" id="tcc-meals"></div>
          </div>
        </div>
        <div class="today-nut-grid" id="today-nut-grid"></div>
      </section>

      <!-- Compare -->
      <section class="hs" id="hs-compare">
        <div class="hs-hd"><span class="hs-tag">COMPARE</span><h2 class="hs-ttl">昨日との比較</h2></div>
        <div class="compare-list" id="compare-list"></div>
      </section>

      <!-- 7-Day Trend -->
      <section class="hs">
        <div class="hs-hd"><span class="hs-tag">TREND</span><h2 class="hs-ttl">7日間カロリー推移</h2></div>
        <div class="trend-wrap" id="trend-wrap">
          <div class="trend-bar-area" id="trend-bar-area"></div>
          <div class="trend-label-row" id="trend-label-row"></div>
        </div>
      </section>

      <!-- Deficit Analysis -->
      <section class="hs">
        <div class="hs-hd"><span class="hs-tag">ANALYSIS</span><h2 class="hs-ttl">慢性的な栄養不足レポート</h2></div>
        <div id="deficit-wrap"></div>
      </section>

      <!-- Meal History List -->
      <section class="hs">
        <div class="hs-hd"><span class="hs-tag">HISTORY</span><h2 class="hs-ttl">食事記録一覧</h2></div>
        <div class="meals-grid" id="meals-grid"></div>
      </section>

    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box">
      <p class="modal-title">全データを削除しますか？</p>
      <p class="modal-sub">この操作は元に戻せません。</p>
      <div class="modal-btns">
        <button class="mbtn-cancel" id="modal-cancel">キャンセル</button>
        <button class="mbtn-del" id="modal-confirm">削除する</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
